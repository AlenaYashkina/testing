name: Sync orders and notify

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync RetailCRM to Supabase and send Telegram notifications
        env:
          RETAILCRM_BASE_URL: ${{ secrets.RETAILCRM_BASE_URL }}
          RETAILCRM_API_KEY: ${{ secrets.RETAILCRM_API_KEY }}
          RETAILCRM_SITE_CODE: ${{ secrets.RETAILCRM_SITE_CODE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HIGH_VALUE_THRESHOLD: ${{ secrets.HIGH_VALUE_THRESHOLD }}
        run: npm run sync:all
